name: Build and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^plugin_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: basefinder-${{ steps.version.outputs.version }}
          path: build/libs/basefinder-${{ steps.version.outputs.version }}.jar

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BaseFinder v${{ steps.version.outputs.version }}
          files: build/libs/basefinder-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
          make_latest: true
