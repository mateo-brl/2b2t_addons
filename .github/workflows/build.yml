name: Build Plugin

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: List build output
        run: ls -la build/libs/ || echo "No build/libs directory!"

      - name: Verify JAR exists
        run: |
          JAR_COUNT=$(find build/libs -name "*.jar" | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "ERROR: No JAR files found in build/libs/"
            exit 1
          fi
          echo "Found $JAR_COUNT JAR files:"
          find build/libs -name "*.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaseFinder
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: BaseFinder
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.jar
          generate_release_notes: true
          body: |
            ## Installation
            1. Telecharger le fichier `.jar` ci-dessous
            2. Le placer dans `.minecraft/rusherhack/plugins/`
            3. Lancer Minecraft avec RusherHack

            **Requis :** RusherHack + Minecraft 1.21.4

            ## Modules inclus
            - **BaseHunter** - Scanner automatique de bases
            - **ChunkHistory** - Detection de nouveaux chunks
            - **ElytraBot** - Vol elytra automatique
            - **AutoTravel** - Voyage intelligent via Nether/Elytra/Marche
